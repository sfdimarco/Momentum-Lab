name: Deploy Momentum Lab → GitHub Pages

on:
  push:
    branches: [master, main]
  workflow_dispatch:   # manual trigger from GitHub Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # GITHUB_PAGES=true tells vite.config.ts to set base: '/Momentum-Lab/'
          GITHUB_PAGES: 'true'
          # Add GEMINI_API_KEY as a repo secret: GitHub Settings → Secrets → Actions
          # The key is baked into the build at compile time via vite define{}
          # Only share this deployed URL with trusted collaborators — the key
          # will be visible in the built JS bundle.
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
